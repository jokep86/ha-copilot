name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Release tag to promote (must start with "release-")'
        required: true
        type: string

jobs:
  promote:
    name: Promote to Production
    environment: production
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: List available release tags
        run: |
          echo "📋 Available release tags for jokep/ha-copilot:"
          curl -s "https://hub.docker.com/v2/repositories/jokep/ha-copilot/tags?page_size=100" \
            | grep -o '"name":"[^"]*"' \
            | cut -d'"' -f4 \
            | grep '^release-' \
            | sort \
            || echo "⚠️ Could not fetch tags"

      - name: Validate tag starts with "release-"
        run: |
          if [[ "${{ inputs.image-tag }}" != release-* ]]; then
            echo "❌ Tag '${{ inputs.image-tag }}' is not a release tag."
            exit 1
          fi
          echo "✅ Tag format is valid: ${{ inputs.image-tag }}"

      - name: Validate image exists on DockerHub
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/jokep/ha-copilot/tags/${{ inputs.image-tag }}")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Image not found on DockerHub (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ Image confirmed: jokep/ha-copilot:${{ inputs.image-tag }}"

      - name: Production deployment placeholder
        run: |
          echo "🚀 Ready to deploy to production!"
          echo "📦 Image: jokep/ha-copilot:${{ inputs.image-tag }}"
          echo "⏳ Deployment step not yet configured."